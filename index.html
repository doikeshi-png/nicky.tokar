<style>
  :root { --bg:#ffffff; --text:#2d2d2d; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; background:#ffffff; color:var(--text); font-family:Helvetica, Arial, sans-serif; overflow-x:hidden; }
  body { min-width:320px; }
  .nt-site { width:100%; background:#ffffff; }
  .nt-section { position:relative; width:100%; margin:0 auto; background:#ffffff; overflow:hidden; }

  .nt-iframe { display:block; width:100%; min-height:720px; border:0; background:#ffffff; overflow:hidden; }
  .nt-smm { background:#ffffff; }
  .nt-current-badge {
    position:absolute;
    top:clamp(16px,2vw,28px);
    right:clamp(16px,2vw,30px);
    z-index:5;
    padding:10px 14px 9px;
    border:1px solid rgba(45,45,45,.24);
    border-radius:999px;
    background:rgba(255,255,255,.94);
    color:#2d2d2d;
    font-family:Helvetica, Arial, sans-serif;
    font-size:clamp(11px,1vw,14px);
    line-height:1;
    letter-spacing:.07em;
    text-transform:uppercase;
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
  }

  /* PHONE VERSION V3 — desktop stays untouched */
  @media (max-width: 768px) {
    html, body {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow-x: hidden !important;
      background: #ffffff !important;
      font-family: Helvetica, Arial, sans-serif !important;
      -webkit-text-size-adjust: 100%;
    }
    .nt-site, .nt-section {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 auto !important;
      padding: 0 !important;
      background: #ffffff !important;
      overflow: hidden !important;
    }
    .nt-static-img {
      display: block !important;
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
      min-height: 0 !important;
      object-fit: contain !important;
      background: #ffffff !important;
    }
    .nt-iframe {
      display: block !important;
      width: 100% !important;
      max-width: 100% !important;
      min-height: 0 !important;
      border: 0 !important;
      background: #ffffff !important;
      overflow: hidden !important;
    }
    .nt-current-badge {
      top: 10px !important;
      right: 10px !important;
      padding: 7px 10px 6px !important;
      font-size: 9px !important;
      letter-spacing: .06em !important;
      background: rgba(255,255,255,.96) !important;
      z-index: 10 !important;
    }
  }

</style>

Left + dx) + 'px';\n        item.style.top = (startTop + dy) + 'px';\n      };\n      const up = () => {\n        item.removeEventListener('pointermove', move);\n        item.removeEventListener('pointerup', up);\n        item.removeEventListener('pointercancel', up);\n      };\n      item.addEventListener('pointermove', move);\n      item.addEventListener('pointerup', up);\n      item.addEventListener('pointercancel', up);\n    });\n  });\n\n  const dock = root.querySelector('[data-nt-dock]');\n  if (dock) {\n    const apps = Array.from(dock.querySelectorAll('.nt-app'));\n    const reset = () => apps.forEach(app => app.style.transform = 'translateY(0) scale(1)');\n    dock.addEventListener('mousemove', (e) => {\n      apps.forEach((app) => {\n        const r = app.getBoundingClientRect();\n        const center = r.left + r.width/2;\n        const dist = Math.abs(e.clientX - center);\n        const influence = Math.max(0, 1 - dist / 90);\n        const scale = 1 + influence * 0.38;\n        const lift = influence * 10;\n        app.style.transform = `translateY(${-lift}px) scale(${scale})`;\n      });\n    });\n    dock.addEventListener('mouseleave', reset);\n    window.addEventListener('blur', reset);\n  }\n})();\n<\/script>\n",

: translate3d(34px,0,0) rotate(1deg) scale(.96);\n  }\n}\n</style>\n\n<script>\n(function () {\n  const root = document.getElementById(\"nt-selected-works-v8\");\n  if (!root) return;\n\n  const cards = Array.from(root.querySelectorAll(\"[data-sw-card]\"));\n\n  cards.forEach((card) => {\n    const deck = card.querySelector(\"[data-sw-deck]\");\n    const images = Array.from(deck.querySelectorAll(\"img\"));\n    let active = 0;\n    let timer = null;\n\n    function setActive(index) {\n      active = (index + images.length) % images.length;\n      images.forEach((img, i) => img.classList.toggle(\"is-active\", i === active));\n    }\n\n    function startShuffle() {\n      stopShuffle();\n      timer = window.setInterval(() => setActive(active + 1), 960);\n    }\n\n    function stopShuffle() {\n      if (timer) window.clearInterval(timer);\n      timer = null;\n    }\n\n    card.addEventListener(\"mouseenter\", startShuffle);\n    card.addEventListener(\"mouseleave\", () => {\n      stopShuffle();\n      setActive(0);\n    });\n\n    deck.addEventListener(\"click\", (event) => {

  function fitFrame(frame) {
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      if (!doc) return;
      const body = doc.body;
      const root = doc.documentElement;
      const h = Math.max(
        body ? body.scrollHeight : 0,
        body ? body.offsetHeight : 0,
        root ? root.scrollHeight : 0,
        root ? root.offsetHeight : 0,
        root ? root.clientHeight : 0
      );
      if (h && Math.abs(frame.offsetHeight - h) > 2) frame.style.height = h + 'px';
    } catch(e) {}
  }

  function initFrame(key) {
    const frame = document.getElementById('nt-frame-' + key);
    if (!frame) return;
    frame.addEventListener('load', function() {
      fitFrame(frame);
      setTimeout(() => fitFrame(frame), 100);
      setTimeout(() => fitFrame(frame), 350);
      setTimeout(() => fitFrame(frame), 900);
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (doc && 'ResizeObserver' in window) {
          const ro = new ResizeObserver(() => fitFrame(frame));
          ro.observe(doc.documentElement);
          if (doc.body) ro.observe(doc.body);
        }
      } catch(e) {}
    });
    frame.srcdoc = frameHTML[key];
  }

  Object.keys(frameHTML).forEach(initFrame);
  window.addEventListener('resize', function() {
    document.querySelectorAll('.nt-iframe').forEach(fitFrame);
  });
  setInterval(function() {
    document.querySelectorAll('.nt-iframe').forEach(fitFrame);
  }, 1800);
})();
